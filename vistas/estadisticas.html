  <!-- Mapa -->
  <div id="map-container">

  <button id="btn-regresar-selector" class="btn-regresar-selector" onclick="regresarAlSelector()">
      ← Seleccionar otra UT
  </button>

  <!-- botones flotantes -->

  <div id="btn-mapas" class="hamburger" 
      onclick="toggleSidebar('menu-mapas-calor')" 
      style="text-align:center; line-height:1.6; letter-spacing:0.5px;">
    <span style="display:block;">☰ Características de la</span>
    <span style="display:block; margin-top:4px;">Unidad Territorial Seleccionada</span>
  </div>

  <div id="btn-indicadores" style="display: none;" class="hamburger" onclick="toggleSidebar('menu-indicadores')">☰ Indicadores por Demarcación</div>

    <!-- menu mapas de calor -->
    <div class="sidebar" id="menu-mapas-calor">

        <div class="sidebar-header">
            <div class="sidebar-header-icono"><i class="fa-solid fa-city"></i></div>
            <div class="sidebar-header-textos">
            <h2>Unidad Territorial</h2>
            <p>Variables sociodemográficas por tema</p>
            </div>
        </div>

        <div class="sidebar-buscador" id="buscador-temas-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="buscador-temas" placeholder="Buscar tema..." autocomplete="off">
        </div>

        <!-- menu dinamico -->
        <div id="menu-principal-calor">
            <h1 id="titulo-temas">Temas</h1>
        </div>

        <!-- submenu -->
        <div id="submenu-calor" style="display:none;">
            <h1 class="titulo-submenu-calor" >Subtemas</h1>

            <div class="submenu-header">
            <div id="calor" class="back-btn" onclick="volverMenuPrincipal(this.id)"><i class="fa-solid fa-arrow-left"></i> Regresar</div>
            <div class="menu-title" id="submenu-title-calor"></div>
            </div>

            <div class="sidebar-buscador">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="buscador-subtemas" placeholder="Buscar variable..." autocomplete="off">
            </div>

            <div id="submenu-items-calor"></div>
        </div>

        <!-- Información de UT seleccionada - AL FINAL -->
        <div id="info-ut-seleccionada" class="info-ut-container">  
        <div class="info-ut-clave" id="info-clave-ut">--</div>
        <div class="info-ut-nombre" id="info-nombre-ut"></div>

        <!-- Secciones -->
        <!-- <div class="info-ut-secciones">
            <div id="info-secciones-completas"></div>
            <div id="info-secciones-parciales"></div>
        </div> -->
        </div>

    </div> 
  

  <!-- TABLA PARA DESCARGAR LOS INDICADORES -->
  <div id="tabla-indices"></div>


  <!-- menu indicadores -->
  <div class="sidebar" id="menu-indicadores">

      <!-- menu dinamico -->
      <div id="menu-principal-indicadores">
        <h1 id="titulo-indicadores-demarcacion">Indicadores por Demarcación</h1>
      </div>

      <!-- submenu -->
      <div id="submenu-indicadores" style="display:none;">

        <h1 class="titulo-submenu-indicadores">Indicadores por Demarcación</h1>
        <div id="indicadores" class="back-btn" onclick="volverMenuPrincipal(this.id)">← Regresar</div>
        <div class="menu-title" id="submenu-title-indicadores"></div>
        <div id="submenu-items-indicadores"></div>
        
        <!-- Contenedor de gráfica -->
        <div id="graficaContainer" style="width:100%; max-width:800px; margin-top:10px;">
            <canvas id="graficaLineasDemarcacion"></canvas>
        </div>

      </div>

  </div>

  <script>
    // Llamar a la función cuando se cargue la página (agregar al final del DOMContentLoaded existente)
    // Prevenir que clics en la tabla cierren el sidebar
    document.addEventListener('DOMContentLoaded', function() {
        const tablaExterna = document.getElementById('tabla-ut-externa');
        if (tablaExterna) {
            tablaExterna.addEventListener('click', function(e) {
                e.stopPropagation(); // Evitar que el clic se propague
            });
        }
        
        cargarDatosTablaUT();
    });
  </script>
